name: ${APP_NAME}

services:
  nginx:
    image: nginx:alpine
    container_name: ${APP_NAME}-nginx
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
    networks:
      - traefik-net
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${APP_NAME}.rule=Host(`${APP_DOMAIN}`)"
      - "traefik.http.routers.${APP_NAME}.entrypoints=websecure"
      - "traefik.http.routers.${APP_NAME}.tls=true"
      - "traefik.http.routers.${APP_NAME}.middlewares=secure-headers@file"
      - "traefik.http.services.${APP_NAME}.loadbalancer.server.port=80"
      - "traefik.docker.network=${TRAEFIK_NETWORK}"

  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: ${APP_NAME}-php
    volumes:
      - .:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini:ro
      - ./docker/php/xdebug.ini:/usr/local/etc/php/conf.d/xdebug.ini:ro
    environment:
      - APP_ENV=${APP_ENV}
    depends_on:
      - mariadb
    networks:
      - internal

  mariadb:
    image: mariadb:11
    container_name: ${APP_NAME}-mariadb
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${DB_NAME}
      MARIADB_USER: ${DB_USER}
      MARIADB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - internal

  mailer:
    image: axllent/mailpit
    container_name: ${APP_NAME}-mailer
    networks:
      - traefik-net
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${APP_NAME}-mail.rule=Host(`mail.${APP_DOMAIN}`)"
      - "traefik.http.routers.${APP_NAME}-mail.entrypoints=websecure"
      - "traefik.http.routers.${APP_NAME}-mail.tls=true"
      - "traefik.http.services.${APP_NAME}-mail.loadbalancer.server.port=8025"
      - "traefik.docker.network=${TRAEFIK_NETWORK}"

volumes:
  db_data:

networks:
  traefik-net:
    external: true
    name: ${TRAEFIK_NETWORK}
  internal:
